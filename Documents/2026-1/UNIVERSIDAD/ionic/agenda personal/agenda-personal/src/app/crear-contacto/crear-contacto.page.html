<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/mis-contactos" text=""></ion-back-button>
    </ion-buttons>
    <ion-title>Crear contacto</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="form-content">
  <div class="page-intro">
    <div class="page-icon-wrap">
      <ion-icon name="person-add-outline"></ion-icon>
    </div>
    <h2>Nuevo contacto</h2>
    <p>Completa los datos del contacto</p>
  </div>

  <ion-card class="form-card">
    <ion-card-content>
      <form [formGroup]="contactoForm" (ngSubmit)="onCreate()">
        <div class="form-field">
          <ion-item lines="none">
            <ion-icon name="person-outline" slot="start" color="primary"></ion-icon>
            <ion-label position="floating">Nombre completo</ion-label>
            <ion-input type="text" formControlName="nombre"></ion-input>
          </ion-item>
        </div>
        <p class="field-error" *ngIf="contactoForm.get('nombre')?.invalid && contactoForm.get('nombre')?.touched">
          El nombre es requerido
        </p>

        <div class="form-field">
          <ion-item lines="none">
            <ion-icon name="call-outline" slot="start" color="primary"></ion-icon>
            <ion-label position="floating">Teléfono</ion-label>
            <ion-input type="tel" formControlName="telefono"></ion-input>
          </ion-item>
        </div>
        <p class="field-error" *ngIf="contactoForm.get('telefono')?.invalid && contactoForm.get('telefono')?.touched">
          El teléfono es requerido
        </p>

        <div class="form-field">
          <ion-item lines="none">
            <ion-icon name="mail-outline" slot="start" color="primary"></ion-icon>
            <ion-label position="floating">Correo electrónico</ion-label>
            <ion-input type="email" formControlName="email"></ion-input>
          </ion-item>
        </div>
        <p class="field-error" *ngIf="contactoForm.get('email')?.invalid && contactoForm.get('email')?.touched">
          <ng-container *ngIf="contactoForm.get('email')?.errors?.['required']">El correo es requerido</ng-container>
          <ng-container *ngIf="contactoForm.get('email')?.errors?.['email']">Ingresa un correo válido</ng-container>
        </p>

        <ion-button expand="block" type="submit" color="success" class="submit-btn" [disabled]="contactoForm.invalid">
          <ion-icon name="save-outline" slot="start"></ion-icon>
          Guardar contacto
        </ion-button>
      </form>
    </ion-card-content>
  </ion-card>
</ion-content>
